<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Surface Film Catalog — Urban India 2025</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f0e0d;
      --surface:   #181614;
      --surface2:  #222018;
      --border:    #2a2724;
      --gold:      #c8a97a;
      --gold-dim:  #7a6848;
      --text:      #ede5d8;
      --muted:     #8a8078;
      --green:     #5aad8a;
      --amber:     #d4a04a;
      --red:       #c05848;
      --drawer-w:  640px;
      --font:      'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ─────────────────────────────────────────── */
    header {
      padding: 44px 52px 0;
    }
    .eyebrow {
      font-size: 10px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-bottom: 10px;
    }
    header h1 {
      font-size: 24px;
      font-weight: 500;
      letter-spacing: -0.3px;
      color: var(--text);
    }

    /* ── Category tabs ──────────────────────────────────── */
    .tabs {
      display: flex;
      gap: 4px;
      padding: 32px 52px 0;
    }
    .tab {
      padding: 8px 18px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.3px;
      cursor: pointer;
      border: 1px solid transparent;
      color: var(--muted);
      background: transparent;
      transition: all 0.15s;
      font-family: var(--font);
    }
    .tab:hover:not(.locked) { color: var(--text); border-color: var(--border); }
    .tab.active {
      background: var(--surface2);
      border-color: var(--border);
      color: var(--gold);
    }
    .tab.locked { opacity: 0.35; cursor: default; }

    /* ── Sub-filters ────────────────────────────────────── */
    .subfilters {
      display: flex;
      gap: 6px;
      padding: 16px 52px 0;
      align-items: center;
    }
    .subfilter {
      padding: 5px 13px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.2px;
      cursor: pointer;
      border: 1px solid var(--border);
      color: var(--muted);
      background: transparent;
      transition: all 0.15s;
      font-family: var(--font);
    }
    .subfilter:hover { color: var(--text); border-color: var(--gold-dim); }
    .subfilter.active {
      background: var(--gold);
      border-color: var(--gold);
      color: var(--bg);
      font-weight: 500;
    }
    .subfilter .sf-count {
      opacity: 0.65;
      font-size: 10px;
      margin-left: 3px;
    }
    .subfilter.active .sf-count { opacity: 0.75; }

    /* ── Criteria banner ────────────────────────────────── */
    .criteria {
      margin: 20px 52px 0;
      padding: 16px 20px;
      border-left: 2px solid var(--gold-dim);
      background: var(--surface);
      border-radius: 0 4px 4px 0;
    }
    .criteria-label {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-bottom: 6px;
    }
    .criteria p {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.7;
    }

    /* ── Table ──────────────────────────────────────────── */
    .table-wrap {
      padding: 28px 52px 80px;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      text-align: left;
      padding: 0 20px 12px;
      font-size: 10px;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      color: var(--gold-dim);
      border-bottom: 1px solid var(--border);
      font-weight: 400;
      white-space: nowrap;
    }
    thead th:first-child { padding-left: 0; }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.12s;
    }
    tbody tr:hover { background: var(--surface); }

    td {
      padding: 22px 20px;
      vertical-align: middle;
    }
    td:first-child { padding-left: 0; }

    /* ── Image cell ─────────────────────────────────────── */
    .img-wrap {
      position: relative;
      width: 168px;
      height: 112px;
      border-radius: 5px;
      overflow: hidden;
      cursor: pointer;
      flex-shrink: 0;
    }
    .img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.35s ease;
    }
    .img-wrap:hover img { transform: scale(1.07); }
    .img-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.1) 50%);
      display: flex;
      align-items: flex-end;
      padding: 10px 12px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .img-wrap:hover .img-overlay { opacity: 1; }
    .img-overlay span {
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #fff;
      font-weight: 500;
    }

    /* ── Name cell ──────────────────────────────────────── */
    .name-cell .film-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      line-height: 1.3;
      margin-bottom: 4px;
    }
    .name-cell .film-sub {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.5;
    }
    .name-cell .film-sub i { font-style: italic; }

    /* ── Score bars ─────────────────────────────────────── */
    .score-col { min-width: 100px; }
    .score-num {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 6px;
    }
    .bar-track {
      height: 3px;
      background: var(--surface2);
      border-radius: 2px;
      overflow: hidden;
      width: 90px;
    }
    .bar-fill { height: 100%; border-radius: 2px; }
    .bar-demand  { background: var(--amber); }
    .bar-mimicry { background: var(--green); }

    /* ── Score pill ─────────────────────────────────────── */
    .score-pill {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1.5px solid;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.5px;
    }
    .t-strong { border-color: var(--green); color: var(--green); }
    .t-niche  { border-color: var(--amber); color: var(--amber); }
    .t-low    { border-color: var(--red);   color: var(--red); }

    /* ── Tier badge ─────────────────────────────────────── */
    .tier-badge {
      font-size: 10px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      padding: 4px 9px;
      border-radius: 3px;
      font-weight: 500;
    }
    .t-strong .tier-badge, .tier-badge.t-strong { background: rgba(90,173,138,0.12); color: var(--green); }
    .tier-badge.t-niche  { background: rgba(212,160,74,0.12); color: var(--amber); }
    .tier-badge.t-low    { background: rgba(192,88,72,0.12);  color: var(--red); }

    /* ── Drawer ─────────────────────────────────────────── */
    .backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 100;
      opacity: 0; pointer-events: none;
      transition: opacity 0.22s;
    }
    .backdrop.open { opacity: 1; pointer-events: all; }

    .drawer {
      position: fixed; top: 0; right: 0;
      width: var(--drawer-w); max-width: 95vw;
      height: 100vh;
      background: var(--surface);
      border-left: 1px solid var(--border);
      z-index: 101;
      transform: translateX(100%);
      transition: transform 0.28s ease;
      display: flex; flex-direction: column;
    }
    .drawer.open { transform: translateX(0); }

    .drawer-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 28px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .drawer-title { font-size: 13px; font-weight: 500; color: var(--gold); }
    .close-btn {
      background: none; border: 1px solid var(--border);
      color: var(--muted); width: 28px; height: 28px;
      border-radius: 4px; cursor: pointer; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font);
      transition: border-color 0.15s, color 0.15s;
    }
    .close-btn:hover { border-color: var(--gold); color: var(--gold); }

    .drawer-body {
      flex: 1; overflow-y: auto;
      padding: 32px 32px 60px;
    }
    .drawer-body::-webkit-scrollbar { width: 3px; }
    .drawer-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Markdown ───────────────────────────────────────── */
    .md h1 { font-size: 18px; font-weight: 500; color: var(--text); margin-bottom: 14px; letter-spacing: -0.2px; }
    .md h2 { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold-dim); margin: 28px 0 10px; font-weight: 400; }
    .md h3 { font-size: 13px; font-weight: 500; color: var(--text); margin: 18px 0 8px; }
    .md p  { font-size: 13px; color: var(--muted); line-height: 1.75; margin-bottom: 12px; }
    .md ul, .md ol { padding-left: 18px; margin-bottom: 12px; }
    .md li { font-size: 13px; color: var(--muted); line-height: 1.65; margin-bottom: 5px; }
    .md strong { color: var(--text); font-weight: 600; }
    .md em { font-style: italic; }
    .md hr { border: none; border-top: 1px solid var(--border); margin: 22px 0; }
    .md blockquote { border-left: 2px solid var(--gold-dim); padding-left: 14px; margin: 14px 0; font-style: italic; color: var(--muted); }
    .md img { max-width: 100%; border-radius: 5px; margin: 10px 0; }
    .md code { font-family: 'SF Mono', 'Courier New', monospace; font-size: 11px; background: var(--surface2); padding: 2px 5px; border-radius: 3px; color: var(--gold); }
    .md table { width: 100%; border-collapse: collapse; margin: 14px 0; }
    .md th { text-align: left; padding: 8px 12px; font-size: 10px; letter-spacing: 1.2px; text-transform: uppercase; color: var(--gold-dim); background: var(--surface2); border-bottom: 1px solid var(--border); font-weight: 400; }
    .md td { padding: 9px 12px; border-bottom: 1px solid var(--border); font-size: 12px; color: var(--muted); }
    .md tr td:first-child { color: var(--text); }

    .loading { text-align: center; padding: 60px 0; color: var(--muted); font-size: 13px; }

    /* ── Responsive ─────────────────────────────────────── */
    @media (max-width: 860px) {
      header, .tabs, .subfilters, .criteria { padding-left: 20px; padding-right: 20px; }
      .criteria { margin-left: 20px; margin-right: 20px; }
      .table-wrap { padding: 24px 20px 60px; }
      :root { --drawer-w: 100vw; }
      .hide-sm { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="eyebrow">Urban India · 2025</div>
  <h1>Surface Film Catalog</h1>
</header>

<!-- Category tabs -->
<div class="tabs">
  <button class="tab active" data-cat="veneers" id="tab-veneers">Veneers</button>
  <button class="tab locked" data-cat="murals" disabled>Murals</button>
  <button class="tab locked" data-cat="limewash" disabled>Limewash</button>
</div>

<!-- Sub-filters (populated by JS) -->
<div class="subfilters" id="subfilters"></div>

<!-- Winning criteria -->
<div class="criteria" id="criteria-box">
  <div class="criteria-label">Winning Criteria</div>
  <p id="criteria-text"></p>
</div>

<!-- Table -->
<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>Panel</th>
        <th>Film</th>
        <th>Demand</th>
        <th>Mimicry</th>
        <th class="hide-sm">Finish</th>
        <th class="hide-sm">Best For</th>
        <th>Score</th>
        <th>Tier</th>
      </tr>
    </thead>
    <tbody id="tbody">
      <tr><td colspan="8" class="loading">Loading…</td></tr>
    </tbody>
  </table>
</div>

<!-- Backdrop + Drawer -->
<div class="backdrop" id="backdrop"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <span class="drawer-title" id="drawer-title">Report</span>
    <button class="close-btn" id="close-btn">✕</button>
  </div>
  <div class="drawer-body">
    <div class="md" id="drawer-md"><div class="loading">Loading…</div></div>
  </div>
</div>

<script>
  const CRITERIA = {
    veneers: `A top-performing veneer film must target a high-demand species — walnut, teak, or oak — and replicate it convincingly enough to pass close inspection. Tone accuracy and grain pattern carry the most weight; a misread tone or wrong figure instantly reads as imitation. Finish calibration is the most common failure point: satin 8–15% for most species, open-pore matte for oak and architect-grade briefs. EIR pore registration (emboss aligned to grain lines) is the threshold between a trade-channel product and a specification-grade product. Score 8.5+ requires both demand above 8.0 and mimicry above 7.5.`,
    murals: `Coming soon.`,
    limewash: `Coming soon.`,
  };

  function tierClass(tier) {
    if (tier.includes('Strong')) return 't-strong';
    if (tier.includes('Niche'))  return 't-niche';
    return 't-low';
  }

  function bar(score, cls) {
    return `<div class="score-num">${score.toFixed(1)}</div>
            <div class="bar-track"><div class="bar-fill ${cls}" style="width:${score * 10}%"></div></div>`;
  }

  // ── Sub-filters ──
  function speciesGroup(species) {
    if (species.includes('Walnut')) return 'walnut';
    if (species.includes('Teak'))   return 'teak';
    if (species.includes('Oak') && !species.includes('Lacewood') && !species.includes('Silky')) return 'oak';
    return 'specialty';
  }

  let allFilms = [];
  let activeSubfilter = 'all';

  function renderSubfilters() {
    const counts = { all: allFilms.length, walnut: 0, teak: 0, oak: 0, specialty: 0 };
    allFilms.forEach(f => counts[speciesGroup(f.species)]++);

    const labels = [['all','All'],['walnut','Walnut'],['teak','Teak'],['oak','Oak'],['specialty','Specialty']];
    const container = document.getElementById('subfilters');
    container.innerHTML = labels.map(([key, label]) =>
      `<button class="subfilter${activeSubfilter === key ? ' active' : ''}" data-sf="${key}">${label}<span class="sf-count">${counts[key]}</span></button>`
    ).join('');
    container.querySelectorAll('.subfilter').forEach(btn => {
      btn.addEventListener('click', () => { activeSubfilter = btn.dataset.sf; renderSubfilters(); filterRows(); });
    });
  }

  function filterRows() {
    document.querySelectorAll('#tbody tr[data-sf]').forEach(tr => {
      tr.style.display = (activeSubfilter === 'all' || tr.dataset.sf === activeSubfilter) ? '' : 'none';
    });
  }

  async function loadCatalog() {
    allFilms = await fetch('./films.json').then(r => r.json());
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';

    allFilms.forEach(f => {
      const tc = tierClass(f.tier);
      const tr = document.createElement('tr');
      tr.dataset.sf = speciesGroup(f.species);
      tr.innerHTML = `
        <td>
          <div class="img-wrap" role="button" tabindex="0" data-file="${f.file}" data-name="${f.name}">
            <img src="${f.image}" alt="${f.name}" loading="lazy" />
            <div class="img-overlay"><span>View Report ↗</span></div>
          </div>
        </td>
        <td class="name-cell">
          <div class="film-name">${f.name}</div>
          <div class="film-sub">${f.code}<br><i>${f.speciesLatin}</i></div>
        </td>
        <td class="score-col">${bar(f.demand, 'bar-demand')}</td>
        <td class="score-col">${bar(f.mimicry, 'bar-mimicry')}</td>
        <td class="hide-sm" style="font-size:12px;color:var(--muted);max-width:150px;line-height:1.5">${f.finish}</td>
        <td class="hide-sm" style="font-size:12px;color:var(--muted);max-width:160px;line-height:1.6">${f.bestCities.replace(/·/g, '<br>')}</td>
        <td><div class="score-pill ${tc}">${f.score.toFixed(1)}</div></td>
        <td><span class="tier-badge ${tc}">${f.tier}</span></td>
      `;
      tbody.appendChild(tr);
    });

    // Update Veneers tab with total count
    const tabBtn = document.getElementById('tab-veneers');
    tabBtn.innerHTML = `Veneers <span class="sf-count">${allFilms.length}</span>`;

    document.querySelectorAll('.img-wrap').forEach(el => {
      const open = () => openDrawer(el.dataset.file, el.dataset.name);
      el.addEventListener('click', open);
      el.addEventListener('keydown', e => e.key === 'Enter' && open());
    });

    renderSubfilters();
  }

  // ── Drawer ──
  const drawer   = document.getElementById('drawer');
  const backdrop = document.getElementById('backdrop');

  async function openDrawer(path, name) {
    document.getElementById('drawer-title').textContent = name;
    document.getElementById('drawer-md').innerHTML = '<div class="loading">Loading…</div>';
    drawer.classList.add('open');
    backdrop.classList.add('open');
    document.body.style.overflow = 'hidden';
    try {
      const md = await fetch(path).then(r => r.text());
      document.getElementById('drawer-md').innerHTML = marked.parse(md);
    } catch {
      document.getElementById('drawer-md').innerHTML = '<div class="loading">Could not load report.</div>';
    }
  }

  function close() {
    drawer.classList.remove('open');
    backdrop.classList.remove('open');
    document.body.style.overflow = '';
  }

  document.getElementById('close-btn').addEventListener('click', close);
  backdrop.addEventListener('click', close);
  document.addEventListener('keydown', e => e.key === 'Escape' && close());

  // ── Tabs ──
  function setTab(cat) {
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.cat === cat));
    document.getElementById('criteria-text').textContent = CRITERIA[cat] || '';
  }

  document.querySelectorAll('.tab:not(.locked)').forEach(t => {
    t.addEventListener('click', () => setTab(t.dataset.cat));
  });

  // ── Boot ──
  setTab('veneers');
  loadCatalog();
</script>
</body>
</html>
