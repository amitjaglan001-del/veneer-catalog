<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Veneer Film Catalog — Urban India 2025</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f0e0d;
      --surface:   #1a1816;
      --surface2:  #252220;
      --border:    #2e2b28;
      --gold:      #c8a97a;
      --gold-dim:  #8a7050;
      --text:      #e8e0d5;
      --text-muted:#9a8f82;
      --green:     #4caf8a;
      --amber:     #d4a04a;
      --red:       #c45c4a;
      --drawer-w:  600px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Georgia', serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      padding: 40px 48px 28px;
      border-bottom: 1px solid var(--border);
    }
    header .eyebrow {
      font-size: 11px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 8px;
    }
    header h1 {
      font-size: 26px;
      font-weight: normal;
      color: var(--text);
      letter-spacing: 0.3px;
    }
    header p {
      margin-top: 6px;
      font-size: 13px;
      color: var(--text-muted);
      font-style: italic;
    }

    /* ── Table wrapper ── */
    .table-wrap {
      padding: 32px 48px 80px;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead th {
      text-align: left;
      padding: 0 16px 12px;
      font-size: 10px;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      color: var(--gold-dim);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    thead th:first-child { padding-left: 0; }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    tbody tr:hover { background: var(--surface); }

    td {
      padding: 20px 16px;
      vertical-align: middle;
    }
    td:first-child { padding-left: 0; }

    /* ── Image cell ── */
    .img-cell {
      position: relative;
      width: 140px;
      min-width: 140px;
    }
    .img-wrap {
      position: relative;
      width: 130px;
      height: 90px;
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
    }
    .img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s;
    }
    .img-wrap:hover img { transform: scale(1.06); }
    .img-overlay {
      position: absolute;
      inset: 0;
      background: rgba(10,9,8,0.65);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .img-wrap:hover .img-overlay { opacity: 1; }
    .img-overlay span {
      font-size: 10px;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      color: var(--gold);
      border: 1px solid var(--gold);
      padding: 5px 10px;
      border-radius: 2px;
    }

    /* ── Name cell ── */
    .name-cell .film-name {
      font-size: 14px;
      color: var(--text);
      line-height: 1.3;
    }
    .name-cell .film-code {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 3px;
      font-family: 'Courier New', monospace;
    }
    .name-cell .film-species {
      font-size: 11px;
      color: var(--text-muted);
      font-style: italic;
      margin-top: 2px;
    }

    /* ── Score bar ── */
    .score-bar-wrap {
      min-width: 110px;
    }
    .score-label {
      font-size: 13px;
      color: var(--text);
      margin-bottom: 5px;
    }
    .score-bar {
      height: 4px;
      background: var(--surface2);
      border-radius: 2px;
      overflow: hidden;
    }
    .score-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.6s ease;
    }
    .bar-demand  { background: var(--amber); }
    .bar-mimicry { background: var(--green); }

    /* ── Finish / Cities cells ── */
    .finish-cell, .cities-cell {
      font-size: 12px;
      color: var(--text-muted);
      max-width: 160px;
      line-height: 1.5;
    }

    /* ── Film score pill ── */
    .score-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 15px;
      font-weight: bold;
      border: 2px solid;
    }
    .score-pill.tier-top    { border-color: var(--gold);  color: var(--gold); }
    .score-pill.tier-strong { border-color: var(--green); color: var(--green); }
    .score-pill.tier-niche  { border-color: var(--amber); color: var(--amber); }
    .score-pill.tier-low    { border-color: var(--red);   color: var(--red); }

    /* ── Tier badge ── */
    .tier-badge {
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 2px;
      white-space: nowrap;
    }
    .tier-badge.tier-top    { background: rgba(200,169,122,0.15); color: var(--gold); }
    .tier-badge.tier-strong { background: rgba(76,175,138,0.12);  color: var(--green); }
    .tier-badge.tier-niche  { background: rgba(212,160,74,0.12);  color: var(--amber); }
    .tier-badge.tier-low    { background: rgba(196,92,74,0.12);   color: var(--red); }

    /* ── Drawer ── */
    .drawer-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .drawer-backdrop.open { opacity: 1; pointer-events: all; }

    .drawer {
      position: fixed;
      top: 0;
      right: 0;
      width: var(--drawer-w);
      max-width: 95vw;
      height: 100vh;
      background: var(--surface);
      border-left: 1px solid var(--border);
      z-index: 101;
      transform: translateX(100%);
      transition: transform 0.3s ease;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .drawer.open { transform: translateX(0); }

    .drawer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .drawer-title {
      font-size: 14px;
      letter-spacing: 0.5px;
      color: var(--gold);
    }
    .drawer-close {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 28px;
      height: 28px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s, color 0.15s;
    }
    .drawer-close:hover { border-color: var(--gold); color: var(--gold); }

    .drawer-body {
      flex: 1;
      overflow-y: auto;
      padding: 28px 28px 48px;
    }
    .drawer-body::-webkit-scrollbar { width: 4px; }
    .drawer-body::-webkit-scrollbar-track { background: transparent; }
    .drawer-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Markdown render styles ── */
    .md-content h1 { font-size: 20px; font-weight: normal; color: var(--text); margin-bottom: 12px; }
    .md-content h2 { font-size: 14px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gold-dim); margin: 28px 0 10px; }
    .md-content h3 { font-size: 13px; color: var(--text); margin: 20px 0 8px; }
    .md-content p  { font-size: 13px; color: var(--text-muted); line-height: 1.7; margin-bottom: 12px; }
    .md-content ul, .md-content ol { padding-left: 18px; margin-bottom: 12px; }
    .md-content li { font-size: 13px; color: var(--text-muted); line-height: 1.6; margin-bottom: 4px; }
    .md-content strong { color: var(--text); font-weight: 600; }
    .md-content em { color: var(--text-muted); font-style: italic; }
    .md-content code { font-family: 'Courier New', monospace; font-size: 11px; background: var(--surface2); padding: 2px 5px; border-radius: 2px; color: var(--gold); }
    .md-content hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
    .md-content blockquote { border-left: 2px solid var(--gold-dim); padding-left: 12px; margin: 12px 0; color: var(--text-muted); font-style: italic; }
    .md-content img { max-width: 100%; border-radius: 4px; margin: 8px 0; }
    .md-content table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 12px; }
    .md-content th { text-align: left; padding: 8px 10px; background: var(--surface2); color: var(--gold-dim); font-size: 10px; letter-spacing: 1px; text-transform: uppercase; border-bottom: 1px solid var(--border); }
    .md-content td { padding: 8px 10px; border-bottom: 1px solid var(--border); color: var(--text-muted); }
    .md-content td:first-child { color: var(--text); }

    /* ── Loading / empty state ── */
    .loading { text-align: center; padding: 60px 0; color: var(--text-muted); font-size: 13px; }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      header { padding: 28px 20px 20px; }
      .table-wrap { padding: 24px 20px 60px; }
      td { padding: 16px 10px; }
      :root { --drawer-w: 100vw; }
      .cities-cell { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="eyebrow">Veneer Intelligence Report · Urban India 2025</div>
  <h1>Film Catalog — Comparative Analysis</h1>
  <p>5 films evaluated across species demand, mimicry quality, and India market fit</p>
</header>

<div class="table-wrap">
  <table id="catalog-table">
    <thead>
      <tr>
        <th>Panel</th>
        <th>Film</th>
        <th>Demand</th>
        <th>Mimicry</th>
        <th>Finish</th>
        <th class="cities-col">Best Cities</th>
        <th>Score</th>
        <th>Tier</th>
      </tr>
    </thead>
    <tbody id="catalog-body">
      <tr><td colspan="8" class="loading">Loading films…</td></tr>
    </tbody>
  </table>
</div>

<!-- Drawer -->
<div class="drawer-backdrop" id="backdrop"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <span class="drawer-title" id="drawer-title">Film Report</span>
    <button class="drawer-close" id="drawer-close" aria-label="Close">✕</button>
  </div>
  <div class="drawer-body">
    <div class="md-content" id="drawer-content"><div class="loading">Loading report…</div></div>
  </div>
</div>

<script>
  // ── Helpers ──────────────────────────────────────────────────────────────
  function tierClass(tier) {
    if (tier.includes('Top 3'))   return 'tier-top';
    if (tier.includes('Strong'))  return 'tier-strong';
    if (tier.includes('Niche'))   return 'tier-niche';
    return 'tier-low';
  }

  function scoreBar(score, cls) {
    const pct = (score / 10) * 100;
    return `
      <div class="score-bar-wrap">
        <div class="score-label">${score.toFixed(1)}</div>
        <div class="score-bar"><div class="score-bar-fill ${cls}" style="width:${pct}%"></div></div>
      </div>`;
  }

  // ── Render table ─────────────────────────────────────────────────────────
  async function loadCatalog() {
    const res = await fetch('./films.json');
    const films = await res.json();
    const tbody = document.getElementById('catalog-body');
    tbody.innerHTML = '';

    films.forEach(film => {
      const tc = tierClass(film.tier);
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="img-cell">
          <div class="img-wrap" data-file="${film.file}" data-name="${film.name}" role="button" tabindex="0">
            <img src="${film.image}" alt="${film.name}" loading="lazy" />
            <div class="img-overlay"><span>View Report</span></div>
          </div>
        </td>
        <td class="name-cell">
          <div class="film-name">${film.name}</div>
          <div class="film-code">${film.code}</div>
          <div class="film-species">${film.speciesLatin}</div>
        </td>
        <td>${scoreBar(film.demand, 'bar-demand')}</td>
        <td>${scoreBar(film.mimicry, 'bar-mimicry')}</td>
        <td class="finish-cell">${film.finish}</td>
        <td class="finish-cell cities-col">${film.bestCities.replace(/·/g, '<br>')}</td>
        <td><div class="score-pill ${tc}">${film.score.toFixed(1)}</div></td>
        <td><span class="tier-badge ${tc}">${film.tier}</span></td>
      `;
      tbody.appendChild(tr);
    });

    // Attach click handlers to image wrappers
    document.querySelectorAll('.img-wrap').forEach(el => {
      el.addEventListener('click', () => openDrawer(el.dataset.file, el.dataset.name));
      el.addEventListener('keydown', e => { if (e.key === 'Enter') openDrawer(el.dataset.file, el.dataset.name); });
    });
  }

  // ── Drawer ───────────────────────────────────────────────────────────────
  const drawer   = document.getElementById('drawer');
  const backdrop = document.getElementById('backdrop');
  const title    = document.getElementById('drawer-title');
  const content  = document.getElementById('drawer-content');

  async function openDrawer(mdPath, name) {
    title.textContent = name;
    content.innerHTML = '<div class="loading">Loading report…</div>';
    drawer.classList.add('open');
    backdrop.classList.add('open');
    document.body.style.overflow = 'hidden';

    try {
      const res = await fetch(mdPath);
      const md  = await res.text();
      content.innerHTML = marked.parse(md);
    } catch {
      content.innerHTML = '<div class="loading">Could not load report.</div>';
    }
  }

  function closeDrawer() {
    drawer.classList.remove('open');
    backdrop.classList.remove('open');
    document.body.style.overflow = '';
  }

  document.getElementById('drawer-close').addEventListener('click', closeDrawer);
  backdrop.addEventListener('click', closeDrawer);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });

  // ── Boot ─────────────────────────────────────────────────────────────────
  loadCatalog().catch(err => {
    document.getElementById('catalog-body').innerHTML =
      `<tr><td colspan="8" class="loading">Failed to load films.json — ${err.message}</td></tr>`;
  });
</script>
</body>
</html>
